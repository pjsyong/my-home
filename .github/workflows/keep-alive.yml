name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 0 */5 * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Supabase API Health Check
        run: |
          # 'profiles'나 'users' 등 실제 데이터가 있는 테이블 명 하나만 적어주세요.
          # 만약 테이블명을 모르겠다면 그대로 두셔도 됩니다.
          TARGET_TABLE="your_table_name" 
          
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/$TARGET_TABLE?select=*&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          
          echo "Supabase 응답 코드: $STATUS"
          
          # 200(성공) 또는 404(테이블없음)라도 요청은 도달한 것이므로 성공 처리
          if [ "$STATUS" -eq 200 ] || [ "$STATUS" -eq 404 ] || [ "$STATUS" -eq 406 ]; then
            echo "✅ 성공: Supabase 서버에 신호를 보냈습니다."
          else
            echo "❌ 실패: 인증 오류 혹은 URL 오류 ($STATUS)"
            exit 1
          fi
